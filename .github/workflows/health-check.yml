name: Mercury402 Health Check

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Mercury402 Health
        id: health_check
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://mercury402.uk/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          
          if echo "$BODY" | grep -q '"status":"healthy"'; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed: 'healthy' status not found"
            exit 1
          fi
      
      - name: Check FRED API Configuration
        run: |
          RESPONSE=$(curl -s https://mercury402.uk/health)
          
          if echo "$RESPONSE" | grep -q '"fred_configured":true'; then
            echo "✅ FRED API configured"
          else
            echo "⚠️  FRED API not configured"
          fi
      
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const title = `🚨 Health check failed: ${now}`;
            const body = `
            ## Health Check Failure
            
            **Timestamp:** ${now}
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            The Mercury402 health endpoint failed to respond with a healthy status.
            
            ### Expected
            - HTTP 200
            - Response body contains \`"status":"healthy"\`
            
            ### Actions Required
            1. Check server status: \`curl https://mercury402.uk/health\`
            2. Check server logs
            3. Verify FRED API key is valid
            4. Restart service if necessary
            
            ### Quick Checks
            - [ ] Server responding
            - [ ] FRED API configured
            - [ ] No rate limiting issues
            - [ ] Disk space available
            - [ ] Memory available
            
            ---
            *This issue was auto-generated by the health check workflow.*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'health-check', 'automated']
            });
