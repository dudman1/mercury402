                provenance:
                  source: Federal Reserve Economic Data (FRED)
                  fetched_at: "2026-03-04T18:20:00.000Z"
                  mercury_version: v1.0
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/macro/snapshot/all:
    get:
      summary: Complete macroeconomic snapshot
      description: |
        Fetches all major economic indicators in a single call:
        GDP, UNRATE, CPI, FEDFUNDS, DGS10, DGS2, T10Y2Y, VIX, Dollar Index, Consumer Sentiment.
        
        **Price:** $0.05
        
        **Indicators (10 total):**
        - GDP: Gross Domestic Product
        - UNRATE: Unemployment Rate
        - CPIAUCSL: Consumer Price Index
        - FEDFUNDS: Federal Funds Rate
        - DGS10: 10-Year Treasury Yield
        - DGS2: 2-Year Treasury Yield
        - T10Y2Y: 10Y-2Y Yield Spread
        - VIXCLS: VIX Volatility Index
        - DTWEXBGS: Trade Weighted U.S. Dollar Index
        - UMCSENT: Consumer Sentiment Index
      operationId: getMacroSnapshot
      x-payment-info:
        pricingMode: fixed
        price: "0.050000"
        protocols:
          - x402
          - mpp
      tags: [Composite]
      security:
        - x402Bearer: []
      responses:
        '200':
          description: Macro snapshot with all indicators
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.05"
            X-Data-Age:
              schema:
                type: integer
                description: Seconds since data was cached
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      snapshot_date:
                        type: string
                        format: date
                      source:
                        type: string
                        example: FRED
                      indicators:
                        type: object
                        properties:
                          gdp:
                            $ref: '#/components/schemas/Indicator'
                          unemployment_rate:
                            $ref: '#/components/schemas/Indicator'
                          cpi:
                            $ref: '#/components/schemas/Indicator'
                          fed_funds_rate:
                            $ref: '#/components/schemas/Indicator'
                          yield_10y:
                            $ref: '#/components/schemas/Indicator'
                          yield_2y:
                            $ref: '#/components/schemas/Indicator'
                          yield_spread_10y2y:
                            $ref: '#/components/schemas/Indicator'
                          vix:
                            $ref: '#/components/schemas/Indicator'
                          dollar_index:
                            $ref: '#/components/schemas/Indicator'
                          consumer_sentiment:
                            $ref: '#/components/schemas/Indicator'
                      deterministic:
                        type: boolean
                  provenance:
                    $ref: '#/components/schemas/Provenance'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No data available
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/treasury/yield-curve/historical:
    post:
      summary: Historical Treasury yield curve data
      description: |
        Returns daily yield curve snapshots for a specified date range.
        Fetches all 11 maturities (1M, 3M, 6M, 1Y, 2Y, 3Y, 5Y, 7Y, 10Y, 20Y, 30Y).
        
        **Price:** $0.05
        
        **Constraints:**
        - Maximum date range: 90 days
        - Dates must be in YYYY-MM-DD format
        - start_date must be before end_date
      operationId: getTreasuryHistorical
      x-payment-info:
        pricingMode: fixed
        price: "0.050000"
        protocols:
          - x402
          - mpp
      tags: [Treasury]
      security:
        - x402Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_date, end_date]
              properties:
                start_date:
                  type: string
                  format: date
                  example: "2024-01-01"
                end_date:
                  type: string
                  format: date
                  example: "2024-01-31"
      responses:
        '200':
          description: Historical yield curve snapshots
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.05"
            X-Data-Age:
              schema:
                type: integer
                description: Seconds since data was cached
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      start_date:
                        type: string
                        format: date
                      end_date:
                        type: string
                        format: date
                      source:
                        type: string
                        example: FRED (Federal Reserve Economic Data)
                      snapshots:
                        type: array
                        items:
                          type: object
                          properties:
                            record_date:
                              type: string
                              format: date
                            rates:
                              type: object
                              properties:
                                1_MONTH:
                                  type: number
                                3_MONTH:
                                  type: number
                                6_MONTH:
                                  type: number
                                1_YEAR:
                                  type: number
                                2_YEAR:
                                  type: number
                                3_YEAR:
                                  type: number
                                5_YEAR:
                                  type: number
                                7_YEAR:
                                  type: number
                                10_YEAR:
                                  type: number
                                20_YEAR:
                                  type: number
                                30_YEAR:
                                  type: number
                  provenance:
                    $ref: '#/components/schemas/Provenance'
        '400':
          description: Invalid date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: [MISSING_PARAMS, RANGE_TOO_LARGE, INVALID_RANGE]
                      message:
                        type: string
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No data available for date range
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/treasury/auction-results/recent:
    get:
      summary: Recent Treasury auction results
      description: |
        Returns recent auction results using HQM (High Quality Market Corporate Bond) yields as proxy.
        Includes last 10 observations for 1Y, 5Y, 10Y, 20Y, 30Y maturities.
        
        **Price:** $0.02
        
        **Note:** Uses FRED HQM series as proxy for actual auction data.
      operationId: getTreasuryAuctions
      x-payment-info:
        pricingMode: fixed
        price: "0.020000"
        protocols:
          - x402
          - mpp
      tags: [Treasury]
      security:
        - x402Bearer: []
      responses:
        '200':
          description: Recent auction results
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.02"
            X-Data-Age:
              schema:
                type: integer
                description: Seconds since data was cached
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      source:
                        type: string
                        example: FRED/HQM
                      note:
                        type: string
                        example: Corporate bond yield proxy (High Quality Market rates)
                      auctions:
                        type: array
                        items:
                          type: object
                          properties:
                            maturity:
                              type: string
                              example: "10Y"
                            label:
                              type: string
                              example: "10-Year"
                            recent_yields:
                              type: array
                              items:
                                type: object
                                properties:
                                  date:
                                    type: string
                                    format: date
                                  yield:
                                    type: number
                                  maturity:
                                    type: string
                  provenance:
                    $ref: '#/components/schemas/Provenance'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No auction data available
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

