                example: "$0.40"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositeResponse'
              example:
                data:
                  dashboard: inflation-tracker
                  timestamp: "2026-03-04T18:20:00.000Z"
                  indicators:
                    - series_id: CPIAUCSL
                      title: Consumer Price Index (All Items)
                      value: "315.249"
                      date: "2026-01-01"
