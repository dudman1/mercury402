                  dashboard: labor-market
                  timestamp: "2026-03-04T18:20:00.000Z"
                  indicators:
                    - series_id: UNRATE
                      title: Unemployment Rate
                      value: "4.0"
                      date: "2026-01-01"
                      units: Percent
                    - series_id: ICSA
                      title: Initial Jobless Claims
                      value: "210000"
                      date: "2026-03-01"
                      units: Number
                    - series_id: PAYEMS
                      title: Total Nonfarm Payrolls
                      value: "158500"
                      date: "2026-01-01"
