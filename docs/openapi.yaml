openapi: 3.0.3
info:
  title: Mercury x402 API
  version: 1.2.0
  description: |
    Deterministic financial data with cryptographic provenance.
    
    Payment required via x402 protocol (HTTP 402 + USDC on Base).
    All paid endpoints require `Authorization: Bearer x402_<token>` header.
    
    **Payment Flow:**
    1. Call endpoint without auth → receive 402 with Payment-Required header
    2. Pay via x402 protocol (USDC on Base mainnet)
    3. Retry with Bearer token → receive 200 + data
    
    **Data Sources:**
    - FRED (Federal Reserve Economic Data): 800k+ economic series
    - U.S. Treasury rates: 11 maturities via FRED DGS series
    
  contact:
    name: Mercury x402 Support
    url: https://mercury402.uk
  license:
    name: Proprietary
  guidance: "Mercury402 provides deterministic financial data (FRED, Treasury rates, macro indicators) via x402 micropayments on Base. Call any endpoint, receive 402, pay USDC, retry with Bearer token."
    
x-discovery:
  ownershipProofs: []

servers:
  - url: https://mercury402.uk
    description: Production
  - url: http://localhost:4020
    description: Local development

security:
  - x402Bearer: []

tags:
  - name: FRED
    description: Federal Reserve Economic Data series
  - name: Treasury
    description: U.S. Treasury yield curve data
  - name: Composite
    description: Multi-series composite dashboards
  - name: Discovery
    description: Service discovery and health
  - name: Documentation
    description: Documentation and examples

paths:
  /v1/fred/{series_id}:
    get:
      summary: Fetch FRED economic series data
      description: |
        Returns observations for any FRED series ID (GDP, UNRATE, DGS10, etc.).
        
        **Pricing:**
        - Single date or latest: $0.01
        - Date range (observation_start + observation_end): $0.02
        
        **Common Series:**
        - UNRATE: Unemployment Rate
        - GDP: Gross Domestic Product
        - CPIAUCSL: Consumer Price Index
        - DGS10: 10-Year Treasury Rate
        - FEDFUNDS: Federal Funds Rate
        
        Browse all series: https://fred.stlouisfed.org/
      operationId: getFredSeries
      x-payment-info:
        pricingMode: fixed
        price: "0.010000"
        protocols:
          - x402
          - mpp
      tags: [FRED]
      security:
        - x402Bearer: []
      parameters:
        - name: series_id
          in: path
          required: true
          schema:
            type: string
            example: UNRATE
          description: FRED series ID (case-sensitive)
        - name: date
          in: query
          schema:
            type: string
            format: date
            example: "2026-01-01"
          description: Single date observation (YYYY-MM-DD)
        - name: observation_start
          in: query
          schema:
            type: string
            format: date
            example: "2020-01-01"
          description: Start date for range query (requires observation_end)
        - name: observation_end
          in: query
          schema:
            type: string
            format: date
            example: "2023-12-31"
          description: End date for range query (requires observation_start)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1
            example: 5
          description: Max observations to return (ignored if date/range specified)
      responses:
        '200':
          description: Successful response with data and provenance
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.01"
              description: Price charged for this call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FREDResponse'
              example:
                data:
                  series_id: UNRATE
                  title: Unemployment Rate
                  units: Percent
                  frequency: Monthly
                  seasonal_adjustment: Seasonally Adjusted
                  last_updated: "2026-02-07T13:03:22.000Z"
                  observation_count: 1
                  observations:
                    - date: "2026-01-01"
                      value: "4.0"
                provenance:
                  source: Federal Reserve Economic Data (FRED)
                  source_url: https://fred.stlouisfed.org/series/UNRATE
                  fetched_at: "2026-03-04T18:20:00.000Z"
                  mercury_version: v1.0
                  deterministic: true
                  signature: "0x42d8f3f315633eaab09da600a89463314a1344da..."
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: Series not found or no data available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: [SERIES_NOT_FOUND, NO_DATA_FOUND]
                      message:
                        type: string
                      series_id:
                        type: string
              example:
                error:
                  code: SERIES_NOT_FOUND
                  message: "Series 'INVALID' not found in FRED database"
                  series_id: INVALID
        '429':
          description: FRED API rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: RATE_LIMIT_EXCEEDED
                      message:
                        type: string
                      retry_after:
                        type: integer
                        example: 60
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/treasury/yield-curve/daily-snapshot:
    get:
      summary: U.S. Treasury yield curve daily snapshot
      description: |
        Returns daily U.S. Treasury par yield curve rates across 11 maturities.
        Data sourced from FRED series (DGS1MO through DGS30).
        
        **Price:** $0.10
        
        **Maturities covered:**
        - 1 Month, 3 Month, 6 Month
        - 1 Year, 2 Year, 3 Year, 5 Year, 7 Year
        - 10 Year, 20 Year, 30 Year
        
        **Data quality:** Returns 404 if fewer than 5 maturities available.
      operationId: getTreasuryYieldCurve
      x-payment-info:
        pricingMode: fixed
        price: "0.020000"
        protocols:
          - x402
          - mpp
      tags: [Treasury]
      security:
        - x402Bearer: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
            example: "2026-03-01"
          description: Specific date (defaults to latest available)
        - name: v
          in: query
          schema:
            type: string
            enum: ["0.9", "1.0"]
            default: "1.0"
          description: |
            Response format version:
            - 0.9: Legacy format (rates only)
            - 1.0: New format with provenance (default)
      responses:
        '200':
          description: Treasury yield curve data with provenance
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.10"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TreasuryResponseV1'
                  - $ref: '#/components/schemas/TreasuryResponseV0_9'
              examples:
                v1:
                  summary: Version 1.0 (with provenance)
                  value:
                    data:
                      record_date: "2026-03-02"
                      rates:
                        1_MONTH: 3.74
                        3_MONTH: 3.72
                        6_MONTH: 3.68
                        1_YEAR: 3.54
                        2_YEAR: 3.47
                        3_YEAR: 3.49
                        5_YEAR: 3.62
                        7_YEAR: 3.82
                        10_YEAR: 4.05
                        20_YEAR: 4.64
                        30_YEAR: 4.70
                    provenance:
                      source: Federal Reserve Economic Data (FRED) - U.S. Treasury rates
                      source_url: https://fred.stlouisfed.org
                      fetched_at: "2026-03-04T18:07:49.590Z"
                      mercury_version: v1.0
                      deterministic: true
                      cache_until: "2026-03-05T18:07:49.590Z"
                      series_coverage: "11/11 maturities"
                      record_date: "2026-03-02"
                      signature: "0x42d8f3f315633eaab09da600a89463314a1344da..."
                v0_9:
                  summary: Version 0.9 (legacy)
                  value:
                    record_date: "2026-03-02"
                    rates:
                      1_MONTH: 3.74
                      3_MONTH: 3.72
                      10_YEAR: 4.05
                      30_YEAR: 4.70
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No valid Treasury rate data available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: NO_DATA_AVAILABLE
                      message:
                        type: string
                      alternatives:
                        type: array
                        items:
                          type: string
              example:
                error:
                  code: NO_DATA_AVAILABLE
                  message: No valid Treasury rate data available for requested date
                  alternatives: ["/v1/fred/DGS10", "/v1/fred/DGS2", "/v1/fred/DGS30"]
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/composite/economic-dashboard:
    get:
      summary: Economic overview dashboard
      description: |
        Composite endpoint returning GDP, CPI, and Unemployment in one call.
        
        **Price:** $0.50
        
        **Includes:**
        - GDP (Gross Domestic Product)
        - CPIAUCSL (Consumer Price Index)
        - UNRATE (Unemployment Rate)
        
        Returns latest observation for each series.
      operationId: getEconomicDashboard
      x-payment-info:
        pricingMode: fixed
        price: "0.500000"
        protocols:
          - x402
          - mpp
      tags: [Composite]
      security:
        - x402Bearer: []
      responses:
        '200':
          description: Economic indicators dashboard
          headers:
            X-Mercury-Price:
              schema:
                type: string
                example: "$0.50"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositeResponse'
              example:
                data:
                  dashboard: economic-overview
                  timestamp: "2026-03-04T18:20:00.000Z"
                  indicators:
                    - series_id: GDP
                      title: Gross Domestic Product
                      value: "28230.532"
                      date: "2025-10-01"
                      units: Billions of Dollars
                    - series_id: CPIAUCSL
                      title: Consumer Price Index
                      value: "315.249"
                      date: "2026-01-01"
                      units: Index 1982-1984=100
                    - series_id: UNRATE
                      title: Unemployment Rate
                      value: "4.0"
                      date: "2026-01-01"
                      units: Percent
                provenance:
                  source: Federal Reserve Economic Data (FRED)
                  source_url: https://fred.stlouisfed.org/series/composite/economic-dashboard
                  fetched_at: "2026-03-04T18:20:00.000Z"
                  mercury_version: v1.0
                  deterministic: true
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

