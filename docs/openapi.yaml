            X-Data-Age:
              schema:
                type: integer
                description: Seconds since data was cached
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      record_date:
                        type: string
                        format: date
                      rates:
                        type: object
                        properties:
                          5_YEAR:
                            type: number
                          7_YEAR:
                            type: number
                          10_YEAR:
                            type: number
                          20_YEAR:
                            type: number
                          30_YEAR:
                            type: number
                      source:
                        type: string
                        example: FRED (Federal Reserve Economic Data)
                      note:
                        type: string
                        example: Treasury Inflation-Protected Securities (TIPS) yields
                  provenance:
                    $ref: '#/components/schemas/Provenance'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No TIPS rates available
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /.well-known/x402:
    get:
      summary: x402 protocol discovery document
      description: |
        Returns x402 protocol configuration including:
        - Supported payment schemes (exact)
        - Network (Base mainnet - eip155:8453)
        - Asset (USDC - 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913)
        - Merchant wallet (payTo address)
        - Endpoint pricing and descriptions
        
        Used by x402-compatible clients for automatic payment setup.
      operationId: getX402Discovery
      tags: [Discovery]
      security: []
      responses:
        '200':
          description: x402 discovery document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/X402Discovery'

  /health:
    get:
      summary: Service health check
      description: |
        Returns service health status and configuration.
        
        **Fields:**
        - status: "healthy" or "degraded"
        - timestamp: current server time
        - version: service version
        - signing_address: ECDSA wallet for provenance signatures
        - fred_configured: whether FRED API key is set
      operationId: getHealth
      tags: [Discovery]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp, version]
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: "1.0.0"
                  signing_address:
                    type: string
                    nullable: true
                    example: "0xe76795db4100E10374d19E91742A392C658f3a43"
                  fred_configured:
                    type: boolean

  /:
    get:
      summary: Landing page or JSON manifest
      description: |
        Returns landing page HTML (if browser) or JSON manifest (if API client).
        Content-Type negotiation via Accept header.
      operationId: getRoot
      tags: [Documentation]
      security: []
      responses:
        '200':
          description: Landing page or manifest
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: Mercury x402
                  tagline:
                    type: string
                  version:
                    type: string
                  endpoints:
                    type: object

  /docs:
    get:
      summary: Quickstart documentation
      operationId: getDocs
      tags: [Documentation]
      security: []
      responses:
        '200':
          description: HTML documentation
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    x402Bearer:
      type: http
      scheme: bearer
      bearerFormat: x402_<token>
      description: |
        x402 payment token obtained after USDC payment on Base.
        
        **Format:** `Authorization: Bearer x402_<token>`
        
        **How to get a token:**
        1. Call any paid endpoint without auth → receive 402
        2. Extract `Payment-Required` header (base64url-encoded payment info)
        3. Pay via x402 protocol (USDC on Base)
        4. Receive token from payment gateway
        5. Retry request with `Authorization: Bearer x402_<token>`
        
        **Test tokens (dev only):**
        Set `ALLOW_TEST_TOKEN=true` to accept `x402_test` token.

  schemas:
    FREDResponse:
      type: object
      required: [data, provenance]
      properties:
        data:
          type: object
          required: [series_id, observations]
          properties:
            series_id:
              type: string
              example: UNRATE
            title:
              type: string
              example: Unemployment Rate
            units:
              type: string
              example: Percent
            frequency:
              type: string
              example: Monthly
            seasonal_adjustment:
              type: string
              example: Seasonally Adjusted
            last_updated:
              type: string
              format: date-time
            observation_count:
              type: integer
              example: 1
            observations:
              type: array
              items:
                type: object
                required: [date, value]
                properties:
                  date:
                    type: string
                    format: date
                  value:
                    oneOf:
                      - type: string
                      - type: "null"
                    description: FRED returns "." for missing values (converted to null)
                    example: "4.0"
        provenance:
          $ref: '#/components/schemas/Provenance'

    Indicator:
      type: object
      required: [value, date, unit]
      properties:
        value:
          type: number
          example: 4.3
        date:
          type: string
          format: date
          example: "2026-01-01"
        unit:
          type: string
          example: "Percent"

    TreasuryResponseV1:
      type: object
      required: [data, provenance]
      properties:
        data:
          type: object
          required: [record_date, rates]
          properties:
            record_date:
              type: string
              format: date
            rates:
              type: object
              properties:
                1_MONTH:
                  type: number
                  format: float
                3_MONTH:
                  type: number
                6_MONTH:
                  type: number
                1_YEAR:
                  type: number
                2_YEAR:
                  type: number
                3_YEAR:
                  type: number
                5_YEAR:
                  type: number
                7_YEAR:
                  type: number
                10_YEAR:
                  type: number
                20_YEAR:
                  type: number
                30_YEAR:
                  type: number
              additionalProperties: false
        provenance:
          allOf:
            - $ref: '#/components/schemas/Provenance'
            - type: object
              properties:
                series_coverage:
                  type: string
                  example: "11/11 maturities"
                cache_until:
                  type: string
                  format: date-time

    TreasuryResponseV0_9:
      type: object
      required: [record_date, rates]
      properties:
        record_date:
          type: string
          format: date
        rates:
          type: object
          additionalProperties:
            type: number

    CompositeResponse:
      type: object
      required: [data, provenance]
      properties:
        data:
          type: object
          required: [dashboard, timestamp, indicators]
          properties:
            dashboard:
              type: string
              enum: [economic-overview, inflation-tracker, labor-market]
            timestamp:
              type: string
              format: date-time
            indicators:
              type: array
              items:
                type: object
                required: [series_id, value, date]
                properties:
                  series_id:
                    type: string
                  title:
                    type: string
                  value:
                    oneOf:
                      - type: string
                      - type: "null"
                  date:
                    type: string
                    format: date
                  units:
                    type: string
        provenance:
          $ref: '#/components/schemas/Provenance'

    Provenance:
      type: object
      required: [source, source_url, fetched_at, mercury_version, deterministic]
      properties:
        source:
          type: string
          example: Federal Reserve Economic Data (FRED)
        source_url:
          type: string
          format: uri
        fetched_at:
          type: string
          format: date-time
        mercury_version:
          type: string
          example: v1.0
        deterministic:
          type: boolean
          description: Whether this response is deterministic/reproducible
        signature:
          type: string
          nullable: true
          description: ECDSA signature of canonical data (hex, with 0x prefix). Optional - only present if signing wallet is configured.
          pattern: "^0x[a-fA-F0-9]+$"
        requested_date:
          type: string
          format: date
          description: Present if date query param was used
        observation_start:
          type: string
          format: date
          description: Present if observation_start query param was used
        observation_end:
          type: string
          format: date
          description: Present if observation_end query param was used

    X402Discovery:
      type: object
      required: [x402Version, accepts]
      properties:
        x402Version:
          type: integer
          example: 2
        accepts:
          type: array
          items:
            type: object
            required: [scheme, network, amount, payTo, maxTimeoutSeconds, asset]
            properties:
              scheme:
                type: string
                enum: [exact]
              network:
                type: string
                example: "eip155:8453"
                description: Base mainnet
              amount:
                type: string
                example: "150000"
                description: Amount in wei (USDC has 6 decimals)
              payTo:
                type: string
                example: "0xF8d59270cBC746a7593D25b6569812eF1681C6D2"
                description: Merchant wallet address
              maxTimeoutSeconds:
                type: integer
                example: 30
              asset:
                type: string
                example: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
                description: USDC contract address on Base
              extra:
                type: object
                properties:
                  endpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        price:
                          type: number
                        description:
                          type: string
        extensions:
          type: object
          description: Optional x402 protocol extensions

    PaymentRequired:
      type: object
      required: [error, price]
      properties:
        error:
          type: string
          enum: [PAYMENT_REQUIRED, INVALID_PAYMENT_TOKEN, PAYMENT_VERIFICATION_UNAVAILABLE]
        message:
          type: string
        price:
          type: string
          example: "$0.01 USDC (Base)"
        paymentUri:
          type: string
          format: uri
          example: "https://x402.io/pay?endpoint=/v1/fred/UNRATE&amount=0.01&token=USDC&chain=base&recipient=0xF8d59..."
        instructions:
          type: array
          items:
            type: string
        status:
          type: string
          description: Additional status info (present for PAYMENT_VERIFICATION_UNAVAILABLE)

  responses:
    PaymentRequired:
      description: Payment required via x402
      headers:
        Payment-Required:
          schema:
            type: string
          description: Base64url-encoded x402 payment descriptor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PaymentRequired'
          example:
            error: PAYMENT_REQUIRED
            message: Payment required to access this endpoint
            price: "$0.01 USDC (Base)"
            paymentUri: "https://x402.io/pay?endpoint=/v1/fred/UNRATE&amount=0.01&token=USDC&chain=base&recipient=0xF8d59270cBC746a7593D25b6569812eF1681C6D2"
            instructions:
              - "1. Click the paymentUri link above or visit https://x402.io"
              - "2. Select this endpoint and enter your Authorization header value"
              - "3. Make payment (USDC on Base blockchain)"
              - "4. Retry request with Authorization header: Bearer x402_<token>"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: INTERNAL_ERROR
                  message:
                    type: string

    ServiceUnavailable:
      description: Service configuration issue (e.g., missing API key)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: SERVICE_UNAVAILABLE
                  message:
                    type: string
                    example: FRED API key not configured
