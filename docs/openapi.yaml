        - CPILFESL (Core CPI - Less Food & Energy)
      operationId: getInflationTracker
      x-payment-info:
        pricingMode: fixed
        price: "0.400000"
        protocols:
          - x402
          - mpp
      tags: [Composite]
      security:
        - x402Bearer: []
      responses:
        '200':
          description: Inflation indicators
          headers:
            X-Mercury-Price:
